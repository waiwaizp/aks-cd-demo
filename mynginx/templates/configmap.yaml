---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index-blue
data:
  index.html: |
    <html>
    <head><title>Blue</title></head>
    <body style="background: lightblue;">
    <h1>{{ .Values.blue.versionName }}</h1>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index-green
data:
  index.html: |
    <html>
    <head><title>Green</title></head>
    <body style="background: lightgreen;">
    <h1>{{ .Values.green.versionName }}</h1>
    </body>
    </html>